[global]
error_log = var/log/php-fpm/error.log
pid = run/php-fpm7.pid
emergency_restart_threshold = 10
emergency_restart_interval = 10m
demonize = yes

[www]
user = nginx
group = nginx
listen = 9000
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spar_servers = 1
pm.max_spar_servers = 3