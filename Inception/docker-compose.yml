version: '3.7'
services:

  nginx:
    build: nginx/
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "~/Documents/42work/Inception/website:/var/www/html"
    depends_on:
      - wordpress
    networks:
      - frontend
    restart: always

  wordpress:
    build: wordpress/
    container_name: wordpress
    ports:
      - "9000:80"
    volumes:
      - "~/Documents/42work/Inception/website:/var/www/html"
    depends_on:
      - mariadb
    networks:
    - frontend
    - backend
    restart: always

  mariadb:
    build: mariadb/
    container_name: mariadb
    ports:
      - "3306:3306"
    volumes:
      - "~/Documents/42work/Inception/mariadb:/var/lib/mysql"
    networks:
      - backend
    restart : always
  
networks:
  frontend:
  backend:
